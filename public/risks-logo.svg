<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="RISKS INTERNATIONAL S.A.S.">
  <title>RISKS INTERNATIONAL S.A.S.</title>
  <g fill="#0b1d44">
    <!-- Stack of slabs / monolith — réplica estilizada del logo oficial -->
    <g transform="translate(40 25)">
      <polygon points="50 0 110 15 50 30 -10 15" />
      <polygon points="50 24 110 39 110 50 50 65 -10 50 -10 39" />
      <polygon points="50 59 110 74 110 85 50 100 -10 85 -10 74" />
      <polygon points="50 94 110 109 110 120 50 135 -10 120 -10 109" />
      <polygon points="50 129 110 144 110 155 50 170 -10 155 -10 144" />
      <polygon points="50 164 110 179 110 190 50 205 -10 190 -10 179" />
      <polygon points="50 199 110 214 50 229 -10 214" />
      <!-- Inscripción "RISKS INTERNATIONAL" pegada a la pila, estilo wordmark -->
      <text x="-10" y="240" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="20" letter-spacing="1">RISKS</text>
      <text x="-10" y="258" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="11" letter-spacing="0.5">INTERNATIONAL</text>
    </g>
    <!-- Wordmark principal -->
    <text x="180" y="115" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="92" letter-spacing="-2">RISKS</text>
    <text x="180" y="180" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="44" letter-spacing="-1">INTERNATIONAL <tspan font-weight="500">S.A.S.</tspan></text>
    <!-- Slogan -->
    <text x="180" y="232" font-family="Inter, Arial, sans-serif" font-weight="400" font-style="italic" font-size="22" fill="#0b1d44">&#x201C;Trabajamos para facilitar decisiones seguras&#x201D;</text>
  </g>
</svg>
