name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    # Variables dummy: el build no requiere una BD real (las páginas dinámicas
    # se renderizan en runtime). Prisma genera el cliente desde el esquema.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ci?schema=public"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/ci?schema=public"
      AUTH_SECRET: "ci-dummy-secret-please-change-in-production-32"
      NEXT_PUBLIC_APP_NAME: "AcreditaPro"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
